<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Cuántico - Schrödinger</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0a2a, #000);
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* Título adaptable */
h1 {
    text-align: center;
    font-size: 5vw;
    color: #00eaff;
    margin: 10px 0;
}

/* UI tipo app móvil */
#ui {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,30,0.9);
    padding: 15px;
    backdrop-filter: blur(10px);
    box-sizing: border-box;
}

/* Caja de pregunta */
#questionBox {
    background: rgba(0,20,60,0.6);
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #00eaff;
    font-size: 4vw;
}

/* Botones grandes para dedo */
button {
    width: 100%;
    padding: 15px;
    margin-top: 8px;
    border: none;
    background: #00eaff;
    color: black;
    font-size: 4vw;
    font-weight: bold;
    border-radius: 8px;
}

button:active {
    background: #0097a7;
}

#score {
    font-size: 4vw;
    margin-bottom: 5px;
}

#feedback {
    margin-top: 5px;
    font-size: 4vw;
    text-align: center;
}

#resultPanel {
    position: fixed;
    top: 30%;
    width: 100%;
    text-align: center;
}

/* Canvas ocupa toda la pantalla */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<h1>Modelo Cuántico</h1>
<canvas id="atomCanvas"></canvas>

<div id="ui">
    <div id="score">Puntos: 0</div>

    <div id="questionBox">
        <div id="question">Toca "Comenzar"</div>
    </div>

    <div id="answers"></div>
    <div id="feedback"></div>

    <button onclick="newQuestion()">Comenzar / Siguiente</button>
</div>

<div id="resultPanel"></div>

<script>
const canvas = document.getElementById("atomCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let centerX = canvas.width / 2;
let centerY = canvas.height / 2;

let score = 0;
let totalQuestions = 0;
let maxQuestions = 5;
let gameOver = false;

// ================= SONIDO =================
let audioStarted = false;

function startQuantumNoise() {
    if(audioStarted) return;
    audioStarted = true;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.05;

    noise.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start();
}

// activa sonido en primer toque
document.body.addEventListener("touchstart", startQuantumNoise, { once: true });

// ================= ELECTRONES =================
class Electron {
    constructor() {
        this.angle = Math.random() * Math.PI * 2;
        this.radius = Math.random() * 120 + 20;
        this.speed = Math.random() * 0.01 + 0.002;
    }

    update() {
        this.angle += this.speed;
    }

    draw() {
        let x = centerX + Math.cos(this.angle)*this.radius;
        let y = centerY + Math.sin(this.angle)*this.radius;

        ctx.beginPath();
        ctx.fillStyle = "#00eaff";
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

let electrons = [];
for (let i = 0; i < 150; i++) electrons.push(new Electron()); // menos carga móvil

function animate() {
    ctx.fillStyle = "rgba(0,0,20,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    electrons.forEach(e=>{
        e.update();
        e.draw();
    });

    requestAnimationFrame(animate);
}
animate();

// ================= PREGUNTAS =================
const questions = [
{ q: "¿Qué describe un orbital?", options: ["Órbita fija","Probabilidad","Trayectoria"], correct: 1 },
{ q: "Electrón en este modelo:", options: ["Planeta","Onda","Fijo"], correct: 1 },
{ q: "¿Hay órbitas exactas?", options: ["Sí","No"], correct: 1 },
{ q: "¿Qué cambia?", options: ["Nada","Nube electrónica","Núcleo"], correct: 1 }
];

function showFeedback(text, color) {
    const fb = document.getElementById("feedback");
    fb.innerText = text;
    fb.style.color = color;
}

function endGame() {
    gameOver = true;

    document.getElementById("resultPanel").innerHTML = `
        <h2>Puntaje final</h2>
        <p>${score}</p>
        <button onclick="location.reload()">Reiniciar</button>
    `;
}

function newQuestion() {

    if (gameOver) return;

    if (totalQuestions >= maxQuestions) {
        endGame();
        return;
    }

    totalQuestions++;

    const q = questions[Math.floor(Math.random()*questions.length)];

    document.getElementById("question").innerText = q.q;
    document.getElementById("feedback").innerText = "";

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        let btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = () => {

            if (i === q.correct) {
                score += 10;
                showFeedback("✔ Correcto", "#00ff88");
            } else {
                score -= 5;
                showFeedback("✖ Incorrecto", "#ff4444");
            }

            document.getElementById("score").innerText = "Puntos: " + score;

            setTimeout(newQuestion, 1000);
        };

        answersDiv.appendChild(btn);
    });
}
</script>

</body>
</html>
