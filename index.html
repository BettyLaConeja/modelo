<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Cuántico - Schrödinger</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0a2a, #000);
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

h1 {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: #00eaff;
}

#ui {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,30,0.85);
    padding: 20px;
    backdrop-filter: blur(10px);
}

#questionBox {
    background: rgba(0,20,60,0.6);
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #00eaff;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: #00eaff;
    color: black;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

#feedback {
    margin-top: 10px;
    height: 20px;
}

#resultPanel {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
    display: none;
}
</style>
</head>

<body>

<h1>Juego Cuántico: Modelo de Schrödinger</h1>
<canvas id="atomCanvas"></canvas>

<div id="ui">
    <div id="score">Puntos: 0</div>

    <div id="questionBox">
        <div id="question">Presiona "Nueva pregunta"</div>
    </div>

    <div id="answers"></div>
    <div id="feedback"></div>

    <button onclick="newQuestion()">Nueva pregunta</button>
</div>

<div id="resultPanel"></div>

<script>
const canvas = document.getElementById("atomCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let centerX = canvas.width / 2;
let centerY = canvas.height / 2;

let score = 0;
let totalQuestions = 0;
let maxQuestions = 6;
let gameOver = false;

// ================= SONIDO CUÁNTICO =================
let audioCtx;

function startQuantumNoise() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;

    const gain = audioCtx.createGain();
    gain.gain.value = 0.05;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 400;

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    noise.start();
}

document.body.addEventListener("click", () => {
    if (!audioCtx) startQuantumNoise();
}, { once: true });

// sonido respuesta
function playSound(type) {
    const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctxAudio.createOscillator();
    const gain = ctxAudio.createGain();

    osc.connect(gain);
    gain.connect(ctxAudio.destination);

    osc.frequency.value = (type === "correct") ? 120 : 60;
    osc.type = "sine";
    gain.gain.setValueAtTime(0.2, ctxAudio.currentTime);

    osc.start();
    osc.stop(ctxAudio.currentTime + 0.3);
}

// ================= NÚCLEO =================
let nucleusEffect = null;

function drawNucleus() {
    let color = "#ff0077";

    if (nucleusEffect === "correct") color = "#00ff88";
    if (nucleusEffect === "wrong") color = "#ff0033";

    let g = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 40);
    g.addColorStop(0, "#fff");
    g.addColorStop(1, color);

    ctx.beginPath();
    ctx.fillStyle = g;
    ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
    ctx.fill();
}

// ================= ELECTRONES =================
class Electron {
    constructor() {
        this.angle = Math.random() * Math.PI * 2;
        this.radius = Math.random() * 150 + 20;
        this.speed = Math.random() * 0.01 + 0.002;
    }

    update() {
        this.angle += this.speed;
    }

    draw() {
        let x = centerX + Math.cos(this.angle)*this.radius;
        let y = centerY + Math.sin(this.angle)*this.radius;

        ctx.beginPath();
        ctx.fillStyle = "#00eaff";
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

let electrons = [];
for (let i = 0; i < 250; i++) electrons.push(new Electron());

function animate() {
    ctx.fillStyle = "rgba(0,0,20,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawNucleus();

    electrons.forEach(e=>{
        e.update();
        e.draw();
    });

    requestAnimationFrame(animate);
}
animate();

// ================= PREGUNTAS =================
const questions = [
{
q: "¿Qué representa un orbital?",
options: ["Trayectoria fija", "Región de probabilidad", "Órbita circular"],
correct: 1
},
{
q: "¿Cómo se comporta el electrón?",
options: ["Como planeta", "Como onda", "Como esfera"],
correct: 1
},
{
q: "¿Qué describe la función de onda?",
options: ["Velocidad", "Probabilidad", "Masa"],
correct: 1
},
{
q: "¿Hay órbitas exactas?",
options: ["Sí", "No"],
correct: 1
},
{
q: "¿Qué cambia constantemente?",
options: ["El núcleo", "La nube electrónica", "Nada"],
correct: 1
},
{
q: "¿Qué introduce la incertidumbre?",
options: ["Error experimental", "Principio cuántico", "Falta de datos"],
correct: 1
}
];

function showFeedback(text, color) {
    const fb = document.getElementById("feedback");
    fb.innerText = text;
    fb.style.color = color;
}

function endGame() {
    gameOver = true;
    document.getElementById("ui").style.display = "none";

    document.getElementById("resultPanel").style.display = "block";
    document.getElementById("resultPanel").innerHTML = `
        <h2>Resultado final</h2>
        <p>Puntaje: ${score}</p>
        <button onclick="location.reload()">Reiniciar</button>
    `;
}

function newQuestion() {

    if (gameOver) return;

    if (totalQuestions >= maxQuestions) {
        endGame();
        return;
    }

    totalQuestions++;

    const q = questions[Math.floor(Math.random()*questions.length)];

    document.getElementById("question").innerText = q.q;
    document.getElementById("feedback").innerText = "";

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {
        let btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = () => {

            if (i === q.correct) {
                score += 10;
                nucleusEffect = "correct";
                showFeedback("✔ Correcto", "#00ff88");
                playSound("correct");
            } else {
                score -= 5;
                nucleusEffect = "wrong";
                showFeedback("✖ Incorrecto", "#ff4444");
                playSound("wrong");
            }

            document.getElementById("score").innerText = "Puntos: " + score;

            setTimeout(newQuestion, 1200);
        };

        answersDiv.appendChild(btn);
    });
}
</script>

</body>
</html>
