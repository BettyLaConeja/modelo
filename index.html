<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Modelo de Schrödinger - Juego Cuántico</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0a2a, #000);
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

h1 {
    position: absolute;
    top: 10px;
    width: 100%;
    text-align: center;
    color: #00eaff;
    font-size: 22px;
}

#ui {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,30,0.85);
    padding: 15px;
    backdrop-filter: blur(10px);
}

#questionBox {
    background: rgba(0,20,60,0.6);
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #00eaff;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: #00eaff;
    color: black;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

#feedback {
    margin-top: 10px;
    height: 20px;
}

#resultPanel {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
    display: none;
}
</style>
</head>

<body>

<h1>⚛ Modelo Atómico de Schrödinger ⚛</h1>

<canvas id="atomCanvas"></canvas>

<div id="ui">
    <div id="score">Puntos: 0</div>

    <div id="questionBox">
        <div id="question">Cargando...</div>
    </div>

    <div id="answers"></div>
    <div id="feedback"></div>
</div>

<div id="resultPanel"></div>

<script>
const canvas = document.getElementById("atomCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let centerX = canvas.width / 2;
let centerY = canvas.height / 2;

let score = 0;
let gameOver = false;

// ================= SONIDO CUÁNTICO =================
let audioCtx;
let quantumOsc;

function startQuantumNoise() {
    if (audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const gain = audioCtx.createGain();
    gain.gain.value = 0.03;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 120;

    quantumOsc = audioCtx.createOscillator();
    quantumOsc.type = "sine";
    quantumOsc.frequency.value = 55;

    setInterval(() => {
        quantumOsc.frequency.setValueAtTime(
            55 + Math.random() * 2,
            audioCtx.currentTime
        );
    }, 250);

    quantumOsc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);

    quantumOsc.start();
}

document.body.addEventListener("click", startQuantumNoise, { once: true });

// ================= ÁTOMO =================
let nucleusEffect = null;

function drawNucleus() {
    let color = "#ff0077";
    if (nucleusEffect === "correct") color = "#00ff88";
    if (nucleusEffect === "wrong") color = "#ff0033";

    let g = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, 40);
    g.addColorStop(0, "#fff");
    g.addColorStop(1, color);

    ctx.beginPath();
    ctx.fillStyle = g;
    ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
    ctx.fill();
}

// electrones
class Electron {
    constructor() {
        this.angle = Math.random() * Math.PI * 2;
        this.radius = Math.random() * 150 + 20;
        this.speed = Math.random() * 0.01 + 0.002;
    }
    update() { this.angle += this.speed; }
    draw() {
        let x = centerX + Math.cos(this.angle)*this.radius;
        let y = centerY + Math.sin(this.angle)*this.radius;
        ctx.beginPath();
        ctx.fillStyle = "#00eaff";
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

let electrons = [];
for (let i = 0; i < 250; i++) electrons.push(new Electron());

function animate() {
    ctx.fillStyle = "rgba(0,0,20,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawNucleus();
    electrons.forEach(e => { e.update(); e.draw(); });

    requestAnimationFrame(animate);
}
animate();

// ================= PREGUNTAS =================
const questions = [
{q:"¿Qué propone Schrödinger?", options:["Órbitas fijas","Ondas de probabilidad","Planetas"], correct:1},
{q:"¿Qué es un orbital?", options:["Trayectoria fija","Zona de probabilidad","Núcleo"], correct:1},


{q:"El modelo de Schrödinger es:", options:["Determinista","Probabilístico","Clásico"], correct:1},
{q:"¿Dónde está el electrón?", options:["Orbital","Núcleo exacto","Exterior fijo"], correct:0},
{q:"¿Qué es el gato de Schrödinger?", options:["Un gato real","Experimento mental","Un átomo"], correct:1},
{q:"El gato está en:", options:["Un estado definido","Superposición","Vacío"], correct:1},
{q:"¿Cuándo se define el estado del gato?", options:["Al medir","Nunca","Siempre"], correct:0},
{q:"El modelo supera a:", options:["Bohr","Internet","Electricidad"], correct:0}
];

// 🔥 COPIA ÚNICA BARAJADA (NO SE REPITE)
let deck = shuffle([...questions]);

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

// ================= JUEGO =================
function newQuestion() {

    if (gameOver) return;

    if (deck.length === 0) {
        endGame();
        return;
    }

    const q = deck.pop(); // 🔥 nunca se repite

    document.getElementById("question").innerText = q.q;
    document.getElementById("feedback").innerText = "";

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, i) => {

        let btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = () => {

            if (i === q.correct) {
                score += 10;
                nucleusEffect = "correct";
                showFeedback("✔ Correcto", "#00ff88");
            } else {
                score -= 5;
                nucleusEffect = "wrong";
                showFeedback("✖ Incorrecto", "#ff4444");
            }

            document.getElementById("score").innerText = "Puntos: " + score;

            setTimeout(newQuestion, 800);
        };

        answersDiv.appendChild(btn);
    });
}

// ================= FEEDBACK =================
function showFeedback(text, color) {
    const fb = document.getElementById("feedback");
    fb.innerText = text;
    fb.style.color = color;
}

// ================= FINAL =================
function endGame() {
    gameOver = true;
    document.getElementById("ui").style.display = "none";

    let msg =
        score >= 60 ? "Físico cuántico en formación 🧠⚛" :
        score >= 30 ? "Buen entendimiento 🔬" :
        "El electrón está confundido 🤯";

    document.getElementById("resultPanel").style.display = "block";
    document.getElementById("resultPanel").innerHTML = `
        <h2>⚛ Colapso cuántico ⚛</h2>
        <p>Puntaje: ${score}</p>
        <p>${msg}</p>
        <button onclick="location.reload()">Reiniciar universo</button>
    `;
}

newQuestion();
</script>

</body>
</html>
